services:
  backend:
    build:
      context: ./backend
    container_name: ef-backend
    expose:
      - "8080"
    networks:
      - ef-network

  nginx:
    image: nginx:1.27-alpine
    container_name: ef-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - ef-network

networks:
  ef-network:
